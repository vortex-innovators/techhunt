<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Hunt: Identity Verification</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: #111;
            border: 2px solid #00ff00;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff00;
        }

        p {
            font-size: 0.9rem;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            width: 100%;
            transition: all 0.3s;
        }

        button:hover {
            box-shadow: 0 0 15px #00ff00;
            transform: scale(1.02);
        }

        .error {
            color: #ff3333;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }

        /* Matrix effect */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>

<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <h1>ACCESS GRANTED?</h1>
        <p>IDENTIFY YOURSELF TO PROCEED</p>

        <form id="registration-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label>Class</label>
                <input type="text" id="studentClass" required placeholder="e.g. BCA, BSc IT">
            </div>

            <div class="input-group">
                <label>Year</label>
                <select id="year" required>
                    <option value="" disabled selected>Select Year</option>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>

            <button type="submit">Initialize Mission</button>
            <div id="error-msg" class="error"></div>
        </form>
    </div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        // --- CONFIGURATION ---
        // Replace this with your actual Render URL after deployment
        const API_BASE_URL = 'https://tech-hunt-api.onrender.com';
        // ---------------------

        setInterval(draw, 30);

        // Form Submission
        const form = document.getElementById('registration-form');
        const errorMsg = document.getElementById('error-msg');

        form.onsubmit = async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const studentClass = document.getElementById('studentClass').value.trim();
            const year = document.getElementById('year').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, studentClass, year })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('studentName', name);
                    localStorage.setItem('studentClass', studentClass);
                    localStorage.setItem('studentYear', year);
                    window.location.href = 'mission.html';
                } else {
                    errorMsg.innerText = data.message || "Registration failed.";
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "Error: Cannot connect to server. Check if the Render backend is running.";
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>

</html>
